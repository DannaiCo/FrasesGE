<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Fin de Año</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@500&display=swap" rel="stylesheet" />

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: blue;
      }

      .contenedor-total {
        position: relative;
        width: 100%;
        height: 100%;
      }

      /* VIDEO FULL REAL */
      video {
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: fill;
        z-index: 0;
      }

      /* TEXTO */
      .contenedor-frase {
        position: absolute;

        top: 22%;
        left: 37%;

        transform: translate(-50%, -50%);
        align-content: center;
        width: 1000px;
        height: 800px;
        transform: scaleY(0.4); /* 🔥 AJUSTA ESTE VALOR */

        text-align: center;
        z-index: 10;
      }
      #frase {
        font-size: 200px;
        line-height: 1.5;
        letter-spacing: 5px;
        font-weight: 500;
        color: white; /* 🔥 prueba visible */
        font-family: "kit-rounded", sans-serif;
      }
    </style>
  </head>

  <body>
    <div class="contenedor-total">
      <video autoplay muted loop playsinline>
        <source src="fondo.mp4" />
      </video>

      <div class="contenedor-frase">
        <div id="frase">texto fijo</div>
      </div>
    </div>

    <script>
      const frases = [
        "Aún estás a tiempo de empezar de nuevo.",
        "Perdonar también te libera.",
        "Agradecer cambia el día.",
        "Alguien necesita tu ayuda hoy.",
        "Una palabra amable cambia el día.",
        "Hoy puedes elegir la calma.",
        "Lo simple también transforma.",
        "Ayudar también te cambia.",
        "Un momento de silencio ayuda."
      ];

      let index = 0;
      const elemento = document.getElementById("frase");

      function cambiarFrase() {
        elemento.textContent = frases[index];
        index = (index + 1) % frases.length;
      }

      cambiarFrase();
      setInterval(cambiarFrase, 10000);
    </script>
  </body>
</html>
