<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Semana Santa</title>

<meta name="viewport" content="width=1793, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap" rel="stylesheet">

<style>

html,body{
margin:0;
padding:0;
overflow:hidden;
background:black;
}

/* ESCENARIO REAL */
.escenario{
position:absolute;
width:1793px;
height:2051px;
}

/* VIDEO */
video#fondo{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
}

/* ZONA DE CONTENIDO */
.zona{
position:absolute;

width: 868px; /* zona segura centrada */
height:953px;

top:58%;
left:50%;

transform:translate(-50%,-50%);

display:flex;
align-items:center;
justify-content:center;

text-align:center;

z-index:2;
}

/* TEXTO */
#frase{

font-size: 60px; /* tamaño controlado */
color:white;

font-family:"Dela Gothic One", sans-serif;

letter-spacing:4px;

line-height:1.2;

}

</style>
</head>

<body>

<div class="escenario">

<video autoplay muted loop playsinline id="fondo">
<source src="fondo.mp4" type="video/mp4">
</video>

<div class="zona">
<div id="frase">Cargando frase...</div>
</div>

</div>

<script>

const frases = [
"Aún estás a tiempo de empezar de nuevo.",
"Perdonar también te libera.",
"Agradecer cambia el día.",
"Alguien necesita tu ayuda hoy.",
"Una palabra amable cambia el día.",
"Hoy puedes elegir la calma.",
"Lo simple también transforma.",
"Ayudar también te cambia.",
"Un momento de silencio ayuda."
];

const el = document.getElementById("frase");

function cambiarFrase(){
const i = Math.floor(Math.random()*frases.length);
el.textContent = frases[i];
}

cambiarFrase();
setInterval(cambiarFrase,10000);

</script>

</body>
</html>
