<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Fin de Año</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@500&display=swap" rel="stylesheet" />

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 1793px;
        height: 2051px;
        overflow: hidden;
        background: blue;
      }
      .escenario {
        position: absolute;
        width: 1793px;
        height: 2051px;
      }

      .contenedor-total {
        position: relative;
        width: 1793px;
        height: 2051px;
        overflow: hidden;
      }

      video {
        position: absolute;
        top: 0;
        left: 0;

        width: 100%;
        height: 100%;

        object-fit: cover;

        z-index: 0;
      }

      .contenedor-frase {
        position: absolute;

        top: 919px; /* AJUSTA VISUALMENTE */
        left: 50%;

        transform: translateX(-50%);

        width: 844px;

        display: flex;
        justify-content: center;
        align-items: center;

        z-index: 2;
      }

      #frase {
        font-size: 130px; /* escala proporcional */
        color: white;
        text-align: center;
        font-family: "Archivo", sans-serif;
        font-weight: 500;
        letter-spacing: 2px;
      }
    </style>
  </head>

  <body>
    <div class="escenario">
      <video autoplay muted loop playsinline>
        <source src="fondo.mp4" />
      </video>

      <div class="contenedor-frase">
        <div id="frase"></div>
      </div>
    </div>

    <script>
      function escalar() {
        const baseW = 1793;
        const baseH = 2051;

        const screenW = window.innerWidth;
        const screenH = window.innerHeight;

        const scaleX = screenW / baseW;
        const scaleY = screenH / baseH;

        const scale = Math.min(scaleX, scaleY);

        const escenario = document.querySelector(".escenario");

        escenario.style.transform = `scale(${scale})`;

        // 🔥 CENTRADO REAL (esto es lo que te faltaba)
        const offsetX = (screenW - baseW * scale) / 2;
        const offsetY = (screenH - baseH * scale) / 2;

        escenario.style.left = offsetX + "px";
        escenario.style.top = offsetY + "px";
      }

      window.addEventListener("resize", escalar);
      escalar();

      const frases = [
        "Aún estás a tiempo de empezar de nuevo.",
        "Perdonar también te libera.",
        "Agradecer cambia el día.",
        "Alguien necesita tu ayuda hoy.",
        "Una palabra amable cambia el día.",
        "Hoy puedes elegir la calma.",
        "Lo simple también transforma.",
        "Ayudar también te cambia.",
        "Un momento de silencio ayuda."
      ];

      let index = 0;
      const elemento = document.getElementById("frase");

      function cambiarFrase() {
        elemento.textContent = frases[index];
        index = (index + 1) % frases.length;
      }

      cambiarFrase();
      setInterval(cambiarFrase, 10000);
    </script>
  </body>
</html>
