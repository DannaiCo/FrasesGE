<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Día del Padre - iCo Medios</title>

<link rel="stylesheet" href="https://use.typekit.net/vsp7vcb.css">

<style>

html,
body{

    margin:0;
    padding:0;

    width:100vw;
    height:100vh;

    overflow:hidden;
}

.contenedor{

    position:relative;

    width:100vw;
    height:100vh;
}

/* VIDEO DE FONDO */

#fondoVideo{

    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:100%;

    object-fit:fill;

    z-index:0;
}

/* CONTENIDO */

#contenido{

    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:100%;

    z-index:10;
}

/* MENSAJE */

.mensaje{

    position:absolute;

    top:28%;

    left:8%;

    width:84%;

    text-align:center;

    font-family:"filson-soft", sans-serif;

    font-weight:700;

    font-style:normal;

    font-size:72px;

    line-height:1.15;

    color:#0000EC;

    transform:scaleY(0.50);

    transform-origin:center center;

    opacity:0;

    transition:opacity .8s ease;
}

/* NOMBRE PAPÁ */

.papa{

    position:absolute;

    top:70%;

    left:8%;

    width:84%;

    text-align:center;

    font-family:"filson-soft", sans-serif;

    font-weight:700;

    font-style:normal;

    font-size:62px;

    color:#0000EC;

    transform:scaleY(0.50);

    transform-origin:center center;

    opacity:0;

    transition:opacity .8s ease;
}

.mostrar{

    opacity:1;
}

</style>

</head>

<body>

<div class="contenedor">

    <video autoplay muted loop playsinline id="fondoVideo">

        <source src="fondo.mp4" type="video/mp4">

    </video>

    <div id="contenido">

        <div class="mensaje"></div>

        <div class="papa"></div>

    </div>

</div>

<script>

const API_URL =
"https://script.googleusercontent.com/macros/echo?user_content_key=AUkAhnR9sKMc4V_LT0YpJPKgHrTJdw0886LZpZCfFNDpmgqn_PWAkG04bVDbX9kRZgvbFEqfoXH3m59Qk4I-xa_oOHjfdYnsQVZEZGK-I4CHcEfwd6hcV7aFEe_RcBuls2LkfXbRrxyQ5Z0Ga_0Q4tYTUKnD148IiUGF0u1wOkY2LsiW_5PKXaTSE84s06IXxbrC52CGNkw2ZrPMqT1vigNBDcUHE2P6ld_vTvwYRaKn4lj6FagP0VZjSNexLfGeTOgNPvK-AFa0CvCvWO7wVAbZb8yo0mX2MQ&lib=MLNAcr3Jke4q8WCYQeQbKPKeEHa1C_Htb";

const elMensaje = document.querySelector(".mensaje");

const elPapa = document.querySelector(".papa");

async function cargarMensajes(){

    try{

        const response = await fetch(API_URL);

        const data = await response.json();

        if(!data || data.length === 0){

            elPapa.innerText = "";

            elMensaje.innerText = "NO HAY MENSAJES APROBADOS";

            elMensaje.classList.add("mostrar");

            return;
        }

        let index = 0;

        function mostrarMensaje(){

            const item = data[index];

            elPapa.classList.remove("mostrar");

            elMensaje.classList.remove("mostrar");

            setTimeout(()=>{

                const mensaje = item.mensaje || "";

                if(mensaje.length <= 60){

                    elMensaje.style.fontSize = "72px";

                }else if(mensaje.length <= 100){

                    elMensaje.style.fontSize = "60px";

                }else{

                    elMensaje.style.fontSize = "48px";

                }

                elMensaje.innerText =
                    `"${mensaje}"`;

                elPapa.innerText =
                    item.papa
                    ? item.papa.toUpperCase()
                    : "";

                elMensaje.classList.add("mostrar");

                elPapa.classList.add("mostrar");

            },300);

            index++;

            if(index >= data.length){

                index = 0;
            }
        }

        mostrarMensaje();

        setInterval(mostrarMensaje,5000);

    }

    catch(error){

        console.error(error);

        elPapa.innerText = "";

        elMensaje.innerText =
            "ERROR CARGANDO MENSAJES";

        elMensaje.classList.add("mostrar");

    }

}

cargarMensajes();

</script>

</body>

</html>
