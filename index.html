<!DOCTYPE html> 
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>fin de año</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Open+Sans:ital,wght@1,600&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      width: 100%;
      height: 100%;
    }

    .contenedor-total {
      position: absolute;
      top: 0;
      left: 0;
      width: 1793px;
      height: 2051px;
      transform-origin: top left;
    }

    video#fondo {
      position: absolute;
      top: 0;
      left: 0;
      width: 1793px;
      height: 2051px;
      object-fit: cover;
      z-index: 0;
    }

    .contenedor-frase {
      position: absolute;
      top: 1295px;
      left: 559px;
      width: 737px;
      height: 29px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: rgba(255, 255, 255, 0);
      z-index: 1;
    }

    #frase {
      font-size: 105px;
      color: white;
      font-family: "Open Sans", sans-serif;
      font-weight: 100px;
      font-style: italic;
      letter-spacing: 2px;
      text-align: center;
    }

    .contador {
      position: absolute;
      bottom: 1113px;
      left: 91px;
      width: 89%;
      text-align: center;
      font-size: 153px;
      font-family: "Dela Gothic One", sans-serif;
      font-weight: 400;
      color: #012BFF;
      line-height: 1;
      z-index: 2;
    }
  </style>
</head>

<body>
  <div class="contenedor-total" id="contenedor">

    <video id="fondo" autoplay muted loop playsinline>
      <source src="fondo.mp4" type="video/mp4">
    </video>

    <div class="contenedor-frase">
      <div id="frase">Cargando frase...</div>
    </div>

    <div class="contador" id="contador"></div>
  </div>

<script>

/* FRASES */

const frases = [
  "Para: Cantar goles con extraños",
  "Para: No lavar la camiseta",
  "Para: Sufrir juntos cada partido",
  "Para: Vivir 90 min eternos",
  "Para: Gritarle a la pantalla",
  "Para: Celebrar como nunca",
  "Para: Sentirse técnico"
];

let index = 0;
const elemento = document.getElementById("frase");

function cambiarFrase() {
  elemento.textContent = frases[index];
  index = (index + 1) % frases.length;
}

cambiarFrase();
setInterval(cambiarFrase, 5000);


/* CONTADOR */

const contador = document.getElementById("contador");
const fechaMundial = new Date(2026, 5, 11).getTime();

function actualizarContador() {

  const ahora = new Date().getTime();
  const diferencia = fechaMundial - ahora;

  if (diferencia <= 0) {
    contador.innerHTML = "HOY INICIA EL MUNDIAL";
    return;
  }

  const dias = Math.ceil(
    diferencia / (1000 * 60 * 60 * 24)
  );

  contador.innerHTML = dias +  "&nbsp;DÍAS";
}

actualizarContador();
setInterval(actualizarContador, 60000);


/* ESCALADO */

ffunction escalarPantalla() {
  const baseWidth = 1793;
  const baseHeight = 2051;

  const escalaX = window.innerWidth / baseWidth;
  const escalaY = window.innerHeight / baseHeight;

  // 👇 CAMBIO A FILL
  const escala = Math.max(escalaX, escalaY);

  const contenedor = document.getElementById("contenedor");

  contenedor.style.transform = `scale(${escala})`;

  // 👇 CENTRAR (esto corrige que se vaya a la derecha)
  const offsetX = (window.innerWidth - baseWidth * escala) / 2;
  const offsetY = (window.innerHeight - baseHeight * escala) / 2;

  contenedor.style.left = `${offsetX}px`;
  contenedor.style.top = `${offsetY}px`;
}

</script>
</body>
</html>
