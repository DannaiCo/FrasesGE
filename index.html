<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Fin de Año</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@500&display=swap" rel="stylesheet" />

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 1793px;
        height: 2051px;
        overflow: hidden;
        background: red;
      }

      /* 🔥 CONTENEDOR FULLSCREEN REAL */
    .contenedor-total {
  position: relative;
  width: 1793px;
  height: 2051px;
  overflow: hidden;
}

      /* 🎥 VIDEO AJUSTADO A LA PANTALLA */
      video {
        position: absolute;
        top: 0;
        left: 0;
        width: 1793px;
        height: 2051px;
        object-fit: cover; /* 🔥 ya no fill */
      }

      /* 📝 FRASE (se mantiene igual en proporciones relativas) */
      .contenedor-frase {
        position: absolute;
        top: 34%; /* Ajusté para que respete la proporción original */
        left: 50%;
        transform: translateX(-50%);
        width: 46%;
        height: 48%;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1;
        text-align: center;
      }

      #frase {
        font-size: 80px; /* escala proporcional */
        color: white;
        font-family: "Archivo", sans-serif;
        font-weight: 500;
        letter-spacing: 2px;
      }
    </style>
  </head>

  <body>
    <div class="contenedor-total">
      <!-- 🎥 Fondo -->
      <video id="fondo" autoplay muted loop playsinline>
        <source src="fondo.mp4" type="video/mp4" />
      </video>

      <!-- 📝 Frase -->
      <div class="contenedor-frase">
        <div id="frase">Cargando frase...</div>
      </div>

      <!-- ⏳ Contador -->
      <div class="contador" id="contador"></div>
    </div>

    <script>
      const frases = [
        "Aún estás a tiempo de empezar de nuevo.",
        "Perdonar también te libera.",
        "Agradecer cambia el día.",
        "Alguien necesita tu ayuda hoy.",
        "Una palabra amable cambia el día.",
        "Hoy puedes elegir la calma.",
        "Lo simple también transforma.",
        "Ayudar también te cambia.",
        "Un momento de silencio ayuda."
      ];

      let index = 0;
      const elemento = document.getElementById("frase");

      function cambiarFrase() {
        elemento.textContent = frases[index];
        index = (index + 1) % frases.length;
      }

      cambiarFrase();
      setInterval(cambiarFrase, 10000);
    </script>
  </body>
</html>
